<!DOCTYPE html>
<html>
<head>
<title>HSESTEPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
overflow: hidden;
font-family: Arial, sans-serif;
}

/* Banner Background */
.banner {
position: absolute;
width: 100%;
height: 100vh;
background: url('banner.png') no-repeat center center/cover;
}

/* Leaf Style */
.leaf {
position: absolute;
top: -60px;
width: 50px;
height: 50px;
background: radial-gradient(circle at 30% 30%, #00c853, #1b5e20);
border-radius: 50% 0 50% 50%;
opacity: 0.9;
animation: fall linear infinite, sway ease-in-out infinite;
}

/* Falling Animation */
@keyframes fall {
0% {
transform: translateY(-60px) rotate(0deg);
}
100% {
transform: translateY(110vh) rotate(360deg);
}
}

/* Side-to-side gentle movement */
@keyframes sway {
0%, 100% { transform: translateX(0px); }
50% { transform: translateX(40px); }
}

/* Positioning (more on right side) */
.leaf:nth-child(1) { left: 55%; animation-duration: 14s, 5s; }
.leaf:nth-child(2) { left: 65%; animation-duration: 16s, 6s; }
.leaf:nth-child(3) { left: 75%; animation-duration: 13s, 4s; }
.leaf:nth-child(4) { left: 85%; animation-duration: 18s, 5s; }
.leaf:nth-child(5) { left: 92%; animation-duration: 15s, 6s; }

</style>

</head>

<body>

<div class="banner"></div>

<!-- Falling Leaves -->
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

</body>
</html>
