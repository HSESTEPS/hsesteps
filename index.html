<!DOCTYPE html>
<html>
<head>
<title>HSESTEPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: black;
overflow-x: hidden;
}

/* Banner (full scroll visible) */
.banner {
width: 100%;
height: auto;
display: block;
}

/* Leaf styling */
.leaf {
position: fixed;
top: -120px;
width: 55px; /* adjust if needed */
opacity: 0.95;
pointer-events: none;
animation: fall linear infinite;
}

/* Natural breeze falling (diagonal + rotation) */
@keyframes fall {
0% {
transform: translate(0px, -120px) rotate(0deg);
}
20% {
transform: translate(-15px, 20vh) rotate(45deg);
}
40% {
transform: translate(25px, 40vh) rotate(90deg);
}
60% {
transform: translate(-20px, 65vh) rotate(160deg);
}
80% {
transform: translate(30px, 85vh) rotate(220deg);
}
100% {
transform: translate(40px, 110vh) rotate(300deg);
}
}

/* Top-right origin cluster */
.leaf:nth-of-type(1) {
right: 2%;
animation-duration: 12s;
}

.leaf:nth-of-type(2) {
right: 5%;
animation-duration: 14s;
}

.leaf:nth-of-type(3) {
right: 8%;
animation-duration: 13s;
}

.leaf:nth-of-type(4) {
right: 3%;
animation-duration: 16s;
}

.leaf:nth-of-type(5) {
right: 6%;
animation-duration: 15s;
}

/* Slight variation in size for realism */
.leaf:nth-of-type(2),
.leaf:nth-of-type(4) {
width: 45px;
}

.leaf:nth-of-type(3) {
width: 60px;
}

</style>
</head>

<body>

<!-- Banner -->
<img src="banner.png" class="banner">

<!-- Real falling leaves -->
<img src="leaf.png" class="leaf">
<img src="leaf.png" class="leaf">
<img src="leaf.png" class="leaf">
<img src="leaf.png" class="leaf">
<img src="leaf.png" class="leaf">

</body>
</html>
