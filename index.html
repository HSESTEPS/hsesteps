<!DOCTYPE html>
<html>
<head>
<title>HSESTEPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
overflow: hidden;
font-family: Arial, sans-serif;
}

/* Banner Background */
.banner {
position: absolute;
width: 100%;
height: 100vh;
background: url('banner.png') no-repeat center center/cover;
}

/* Falling Leaves */
.leaf {
position: absolute;
top: -50px;
width: 30px;
height: 30px;
background: url('https://cdn-icons-png.flaticon.com/512/2909/2909762.png') no-repeat center/contain;
opacity: 0.8;
animation: fall linear infinite;
}

/* Animation */
@keyframes fall {
0% {
transform: translateY(-50px) rotate(0deg);
}
100% {
transform: translateY(110vh) rotate(360deg);
}
}

/* Different speeds */
.leaf:nth-child(1) { left: 10%; animation-duration: 10s; }
.leaf:nth-child(2) { left: 25%; animation-duration: 14s; }
.leaf:nth-child(3) { left: 40%; animation-duration: 12s; }
.leaf:nth-child(4) { left: 60%; animation-duration: 16s; }
.leaf:nth-child(5) { left: 80%; animation-duration: 11s; }
</style>

</head>

<body>

<div class="banner"></div>

<!-- Leaves -->
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

</body>
</html>
