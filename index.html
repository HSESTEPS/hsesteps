<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSESTEPS</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow-x: hidden; }

        .banner-container {
            position: relative;
            width: 100%; /* Keeps container within screen width */
            overflow: hidden; 
        }

        .banner {
            width: 100%; /* Forces banner to scale with screen width */
            height: auto; /* Maintains aspect ratio */
            display: block;
        }

        /* Responsive Leaf styling */
        .falling-leaf {
            position: absolute;
            top: -10%; /* Percentage based start */
            width: 8%; /* Leaf size scales with the screen width */
            pointer-events: none;
            z-index: 10;
            animation: fall-sway-animation linear infinite;
        }

        @keyframes fall-sway-animation {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            25% { transform: translateY(25vh) translateX(5vw) rotate(45deg); }
            50% { transform: translateY(50vh) translateX(-5vw) rotate(90deg); }
            75% { transform: translateY(75vh) translateX(4vw) rotate(135deg); }
            100% { transform: translateY(110vh) translateX(0) rotate(180deg); opacity: 0; }
        }

        /* Staggered Leaves using percentages for responsiveness */
        .leaf-1 { right: 5%; animation-duration: 14s; animation-delay: 0s; }
        .leaf-2 { right: 15%; animation-duration: 18s; animation-delay: 3s; }
        .leaf-3 { right: 25%; animation-duration: 16s; animation-delay: 6s; }
        .leaf-4 { right: 8%; animation-duration: 12s; animation-delay: 9s; }
        .leaf-5 { right: 20%; animation-duration: 15s; animation-delay: 2s; }

    </style>
</head>
<body>

    <div class="banner-container">
        <img src="banner.png" class="banner" alt="HSESTEPS Banner">
        <img src="leaf.png" class="falling-leaf leaf-1" alt="Leaf">
        <img src="leaf.png" class="falling-leaf leaf-2" alt="Leaf">
        <img src="leaf.png" class="falling-leaf leaf-3" alt="Leaf">
        <img src="leaf.png" class="falling-leaf leaf-4" alt="Leaf">
        <img src="leaf.png" class="falling-leaf leaf-5" alt="Leaf">
    </div>

</body>
</html>
