<!DOCTYPE html>
<html>
<head>
<title>HSESTEPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin: 0; background: black; }

/* 1. Create a wrapper to hold the banner and the leaves together */
.banner-wrapper {
    position: relative; /* This makes the banner the reference point */
    width: 100%;
    overflow: hidden; /* Ensures leaves don't overflow outside the banner */
}

.banner {
    width: 100%;
    display: block;
}

/* 2. Position leaves relative to the wrapper */
.leaf {
    position: absolute; 
    top: -50px; /* Start slightly above the banner */
    width: 40px; 
    pointer-events: none;
    z-index: 10; /* Keeps leaves on top of the banner */
    animation: fall linear infinite;
}

/* Falling animation */
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(100vh) rotate(360deg); }
}

/* Randomize positions and speed for a natural look */
.leaf:nth-of-type(1) { right: 5%; animation-duration: 8s; }
.leaf:nth-of-type(2) { right: 15%; animation-duration: 12s; animation-delay: 2s; }
.leaf:nth-of-type(3) { right: 25%; animation-duration: 10s; animation-delay: 4s; }
.leaf:nth-of-type(4) { right: 10%; animation-duration: 9s; animation-delay: 6s; }
.leaf:nth-of-type(5) { right: 20%; animation-duration: 11s; animation-delay: 1s; }

</style>
</head>

<body>

<div class="banner-wrapper">
    <img src="banner.png" class="banner" alt="Banner">
    
    <img src="leaf.png" class="leaf" alt="Leaf">
    <img src="leaf.png" class="leaf" alt="Leaf">
    <img src="leaf.png" class="leaf" alt="Leaf">
    <img src="leaf.png" class="leaf" alt="Leaf">
    <img src="leaf.png" class="leaf" alt="Leaf">
</div>

</body>
</html>
