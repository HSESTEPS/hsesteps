<!DOCTYPE html>
<html>
<head>
<title>HSESTEPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
overflow: hidden;
background: black;
}

/* Banner fits entire screen */
.banner {
width: 100%;
height: 100vh;
object-fit: contain;
display: block;
}

/* Leaves */
.leaf {
position: fixed;
top: -60px;
width: 40px;
height: 40px;
background: radial-gradient(circle at 30% 30%, #00c853, #1b5e20);
border-radius: 50% 0 50% 50%;
opacity: 0.9;
animation: fall linear infinite, sway ease-in-out infinite;
pointer-events: none;
}

/* Falling */
@keyframes fall {
0% { transform: translateY(-60px) rotate(0deg); }
100% { transform: translateY(110vh) rotate(360deg); }
}

/* Side movement */
@keyframes sway {
0%,100% { margin-left: 0px; }
50% { margin-left: 40px; }
}

/* Right-side placement */
.leaf:nth-child(1) { left: 60%; animation-duration: 14s, 5s; }
.leaf:nth-child(2) { left: 70%; animation-duration: 16s, 6s; }
.leaf:nth-child(3) { left: 80%; animation-duration: 13s, 4s; }
.leaf:nth-child(4) { left: 88%; animation-duration: 18s, 5s; }
.leaf:nth-child(5) { left: 95%; animation-duration: 15s, 6s; }

</style>
</head>

<body>

<img src="banner.png" class="banner">

<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>
<div class="leaf"></div>

</body>
</html>
